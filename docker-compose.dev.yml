# ============================================================
# docker-compose.dev.yml — FIXED VERSION
# ============================================================

services:
  db:
    image: mysql:8.0
    container_name: coretax_db_dev
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=capstone
    ports:
      - "3306:3306"
    volumes:
      - db_data_dev:/var/lib/mysql
      # Pastikan folder database/init.sql ada di folder utama kamu
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:alpine
    container_name: coretax_redis_dev
    ports:
      - "6380:6379"

  # NOTE: Jika kamu ingin menjalankan backend lewat terminal Windows (npm run dev),
  # kamu bisa mematikan service backend ini atau biarkan saja tapi jangan jalankan npm run dev di Windows.
  # Saya tetap sertakan agar docker-compose tetap valid.
  backend:
    build: ./backend
    container_name: coretax_backend_dev
    ports:
      - "3000:3000"
    env_file: ./backend/.env
    environment:
      - REDIS_URL=redis://redis:6379
      - DB_HOST=db
      - DB_PASSWORD=root
    volumes:
      - ./backend/src:/app/src
    command: npx nodemon src/server.js
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

volumes:
  db_data_dev: